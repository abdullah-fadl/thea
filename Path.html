<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Path Selector</title>
  <style>
    :root {
      --red:#c1121f;
      --black:#0b0b0c;
      --gray:#6b7280;
      --light:#f3f4f6;
      --white:#ffffff;
    }
    html,body{height:100%;margin:0}
    body{font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;background:var(--light);color:var(--black)}
    .shell{min-height:100%;display:flex;flex-direction:column}
    .home{position:relative;flex:1;display:flex;align-items:center;justify-content:center;padding:28px;overflow:hidden;background:linear-gradient(180deg,#fff, #f7f7f8);}
    .card{width:min(720px,92vw);background:rgba(255,255,255,.88);backdrop-filter:blur(8px);
      border:1px solid rgba(0,0,0,.08);border-radius:18px;box-shadow:0 14px 40px rgba(0,0,0,.10);padding:22px 20px;position:relative;z-index:2}
    .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:10px}
    .dot{width:10px;height:10px;border-radius:999px;background:var(--red);box-shadow:0 0 0 6px rgba(193,18,31,.12)}
    h1{margin:8px 0 6px;font-size:20px;text-align:center}
    p{margin:0 0 14px;text-align:center;color:var(--gray);font-size:13px}
    .btns{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:12px;margin-top:14px}
    .btn{appearance:none;border:1px solid rgba(0,0,0,.12);background:var(--black);color:#fff;
      padding:14px 14px;border-radius:14px;font-weight:650;cursor:pointer;font-size:16px}
    .btn.secondary{background:var(--red);}
    .hint{margin-top:10px;text-align:center;font-size:12px;color:var(--gray)}

    .nav{display:none;position:sticky;top:0;z-index:999;background:rgba(255,255,255,.82);backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(0,0,0,.08)}
    .nav-inner{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 12px}
    .nav-left{display:flex;gap:8px;align-items:center}
    .navbtn{appearance:none;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--black);
      padding:8px 10px;border-radius:12px;font-weight:650;cursor:pointer;font-size:13px}
    .navbtn.primary{background:var(--black);color:#fff;border-color:rgba(0,0,0,.2)}
    .navbtn.danger{background:var(--red);color:#fff;border-color:rgba(193,18,31,.25)}
    .framewrap{flex:1;display:none}
    iframe{width:100%;height:calc(100vh - 56px);border:0;display:block;background:#fff}

    /* الخلفية العشوائية */
    .stamps{position:absolute;inset:0;z-index:1;pointer-events:none}
    .stamp{position:absolute;width:160px;height:160px;background-repeat:no-repeat;background-size:contain;opacity:.10;filter:grayscale(1) contrast(1.1);}

    @media (max-width:520px){
      .btns{grid-template-columns:1fr}
    }

    /* عدم ظهور شريط الخيارات بالطباعة + طباعة المحتوى فقط */
    @media print {
      .nav, .home {display:none !important}
      .framewrap {display:block !important}
      iframe {height:100vh !important}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav" id="nav">
      <div class="nav-inner">
        <div class="nav-left">
          <button class="navbtn" id="backBtn" type="button">⬅︎ Back</button>
          <button class="navbtn primary" id="todayBtnTop" type="button">Today’s Path</button>
          <button class="navbtn danger" id="babyBtnTop" type="button">Baby’s Path</button>
          <button class="navbtn" id="nicuBtnTop" type="button">NICU Path</button>
          <button class="navbtn" id="criticalBtnTop" type="button">Critical Care Path</button>
          <button class="navbtn" id="ldrBtnTop" type="button">Labor and Delivery Path</button>
        </div>
        <div>
        </div>
      </div>
    </div>

    <section class="home" id="home">
      <div class="stamps" id="stamps"></div>
      <div class="card">
        <div class="brand"><span class="dot"></span><strong style="letter-spacing:.2px">Choose a Path</strong></div>
        <h1>اختر النموذج المطلوب</h1>
        <p></p>
        <div class="btns">
          <button class="btn" id="todayBtn" type="button">Adult’s Path</button>
          <button class="btn secondary" id="babyBtn" type="button">Baby’s Path</button>
          <button class="btn" id="nicuBtn" type="button">NICU Path</button>
          <button class="btn" id="criticalBtn" type="button">Critical Care Path</button>
          <button class="btn" id="ldrBtn" type="button">Labor and Delivery Path</button>
        </div>
        <div class="hint"></div>
      </div>
    </section>

    <div class="framewrap" id="framewrap">
      <iframe id="viewer" title="Path Viewer"></iframe>
    </div>
  </div>

      for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder("utf-8").decode(bytes);
    }

    // ===== Random background stamps on home only =====
    (function renderStamps(){
      const wrap = document.getElementById("stamps");
      const count = 18;
      for (let i=0;i<count;i++) {
        const d = document.createElement("div");
        d.className = "stamp";
        d.style.backgroundImage = "url('" + IMG_DATA_URL + "')";
        d.style.left = (Math.random()*100).toFixed(2) + "%";
        d.style.top  = (Math.random()*100).toFixed(2) + "%";
        d.style.transform = "translate(-50%,-50%) rotate(" + (Math.random()*360).toFixed(0) + "deg)";
        d.style.opacity = (0.06 + Math.random()*0.10).toFixed(2);
        const size = 110 + Math.random()*120;
        d.style.width = size.toFixed(0) + "px";
        d.style.height = size.toFixed(0) + "px";
        wrap.appendChild(d);
      }
    })();

    const home = document.getElementById("home");
    const nav  = document.getElementById("nav");
    const framewrap = document.getElementById("framewrap");
    const viewer = document.getElementById("viewer");

    let current = null;

    function openPath(which) {
      current = which;
      let html;
      if (which === "today") html = b64ToUtf8(TODAY_B64);
      else if (which === "baby") html = b64ToUtf8(BABY_B64);
      else if (which === "nicu") html = b64ToUtf8(NICU_B64);
      else if (which === "critical") html = b64ToUtf8(CRITICAL_B64);
      else if (which === "ldr") html = b64ToUtf8(LDR_B64);
      else html = b64ToUtf8(TODAY_B64);

      home.style.display = "none";
      nav.style.display = "block";
      framewrap.style.display = "block";

      // Load into iframe as a real document
      viewer.srcdoc = html;
    }

    function goHome(){
      current = null;
      viewer.srcdoc = "";
      framewrap.style.display = "none";
      nav.style.display = "none";
      home.style.display = "flex";
    }

    // Buttons
    document.getElementById("todayBtn").onclick = () => openPath("today");
    document.getElementById("babyBtn").onclick  = () => openPath("baby");
    document.getElementById("nicuBtn").onclick  = () => openPath("nicu");
    document.getElementById("criticalBtn").onclick = () => openPath("critical");
    document.getElementById("ldrBtn").onclick  = () => openPath("ldr");
document.getElementById("todayBtnTop").onclick = () => openPath("today");
    document.getElementById("babyBtnTop").onclick  = () => openPath("baby");
    document.getElementById("nicuBtnTop").onclick  = () => openPath("nicu");
    document.getElementById("criticalBtnTop").onclick = () => openPath("critical");
    document.getElementById("ldrBtnTop").onclick  = () => openPath("ldr");
document.getElementById("backBtn").onclick = () => goHome();

    // Print only the loaded page (no nav)
    const printBtn = document.getElementById("printBtn");
    if (printBtn) printBtn.onclick = () => {
      try {
        if (viewer && viewer.contentWindow) {
          viewer.contentWindow.focus();
          viewer.contentWindow.print();
        } else {
          window.print();
        }
      } catch (e) {
        window.print();
      }
    };

    // Start on home
    goHome();
  </script>
</body>
</html>
