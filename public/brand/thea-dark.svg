<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Dark mode gradient -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <!-- Glow effect for dark mode -->
    <filter id="darkGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  
  <!-- Logo Mark -->
  <g filter="url(#darkGlow)">
    <!-- Main T shape -->
    <rect x="20" y="25" width="60" height="12" rx="6" fill="url(#darkGradient)"/>
    <rect x="44" y="25" width="12" height="55" rx="6" fill="url(#darkGradient)"/>
    
    <!-- Health cross accent -->
    <rect x="56" y="48" width="18" height="6" rx="3" fill="#5EEAD4"/>
    <rect x="62" y="42" width="6" height="18" rx="3" fill="#5EEAD4"/>
    
    <!-- Pulse line accent -->
    <path d="M20 95 L35 95 L40 85 L45 105 L50 90 L55 95 L80 95" 
          stroke="url(#darkGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text "Thea" - light for dark mode -->
  <text x="105" y="75" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="52" font-weight="600" fill="#E2E8F0">
    Thea
  </text>
  
  <!-- Tagline -->
  <text x="107" y="100" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#64748B" letter-spacing="2">
    ELECTRONIC HEALTH RECORDS
  </text>
</svg>
