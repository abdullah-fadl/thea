<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Supply chain icon -->
  <g transform="translate(10, 10)">
    <!-- Three connected hexagons representing supply chain links -->
    <path d="M30 8L44 16V32L30 40L16 32V16L30 8Z" fill="#059669" opacity="0.9"/>
    <path d="M30 18L38 22.5V31.5L30 36L22 31.5V22.5L30 18Z" fill="white" opacity="0.9"/>

    <!-- Arrow connections -->
    <path d="M44 24H52" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M50 20L54 24L50 28" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Second node -->
    <rect x="54" y="14" width="20" height="20" rx="4" fill="#10B981" opacity="0.85"/>
    <path d="M60 24H68M64 20V28" stroke="white" stroke-width="2" stroke-linecap="round"/>

    <!-- Arrow -->
    <path d="M74 24H80" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M78 20L82 24L78 28" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Third node -->
    <circle cx="92" cy="24" r="12" fill="#047857" opacity="0.85"/>
    <path d="M86 24L90 28L98 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="120" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#059669" letter-spacing="-0.5">
    Imdad
  </text>
  <text x="120" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="2.5" text-transform="uppercase">
    SUPPLY CHAIN
  </text>
</svg>
