<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Medical gradient - deeper teal -->
    <linearGradient id="healthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
    
    <!-- Cross glow -->
    <filter id="crossGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Mark with prominent health cross -->
  <g>
    <!-- Circular background -->
    <circle cx="50" cy="55" r="40" fill="#F0FDFA"/>
    <circle cx="50" cy="55" r="38" fill="none" stroke="url(#healthGradient)" stroke-width="2"/>
    
    <!-- T integrated with cross -->
    <rect x="25" y="30" width="50" height="10" rx="5" fill="url(#healthGradient)"/>
    <rect x="45" y="30" width="10" height="45" rx="5" fill="url(#healthGradient)"/>
    
    <!-- Health cross - glowing -->
    <g filter="url(#crossGlow)">
      <rect x="55" y="45" width="20" height="8" rx="4" fill="#14B8A6"/>
      <rect x="61" y="39" width="8" height="20" rx="4" fill="#14B8A6"/>
    </g>
    
    <!-- Heart rate line -->
    <path d="M15 85 L30 85 L35 75 L40 95 L45 82 L50 85 L85 85" 
          stroke="#14B8A6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text "Thea" -->
  <text x="105" y="58" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="600" fill="#0F766E">
    Thea
  </text>
  
  <!-- Health subtitle -->
  <text x="255" y="58" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="48" font-weight="300" fill="#5EEAD4">
    Health
  </text>
  
  <!-- Tagline -->
  <text x="107" y="85" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="12" font-weight="500" fill="#64748B" letter-spacing="3">
    SMART HEALTHCARE PLATFORM
  </text>
</svg>
