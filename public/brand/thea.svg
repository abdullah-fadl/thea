<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Gradient for the logo mark -->
    <linearGradient id="theaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2"/>
      <stop offset="50%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#155E75"/>
    </linearGradient>
    
    <!-- Subtle shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0891B2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Logo Mark - Abstract T with health cross integration -->
  <g filter="url(#softShadow)">
    <!-- Main T shape with rounded corners -->
    <rect x="20" y="25" width="60" height="12" rx="6" fill="url(#theaGradient)"/>
    <rect x="44" y="25" width="12" height="55" rx="6" fill="url(#theaGradient)"/>
    
    <!-- Health cross accent -->
    <rect x="56" y="48" width="18" height="6" rx="3" fill="#22D3EE"/>
    <rect x="62" y="42" width="6" height="18" rx="3" fill="#22D3EE"/>
    
    <!-- Pulse line accent -->
    <path d="M20 95 L35 95 L40 85 L45 105 L50 90 L55 95 L80 95" 
          stroke="url(#theaGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text "Thea" -->
  <text x="105" y="75" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="52" font-weight="600" fill="#0E7490">
    Thea
  </text>
  
  <!-- Tagline -->
  <text x="107" y="100" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#64748B" letter-spacing="2">
    ELECTRONIC HEALTH RECORDS
  </text>
</svg>
