<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180">
  <defs>
    <!-- Tech gradient for dark -->
    <linearGradient id="darkTechGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    
    <linearGradient id="darkAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    
    <!-- Glow for dark mode -->
    <filter id="darkGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  

  <!-- Logo Mark -->
  <g filter="url(#darkGlow)">
    <!-- Left bracket -->
    <path d="M25 45 L15 45 Q8 45 8 52 L8 88 Q8 95 15 95 L25 95" 
          stroke="url(#darkTechGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Right bracket -->
    <path d="M75 45 L85 45 Q92 45 92 52 L92 88 Q92 95 85 95 L75 95" 
          stroke="url(#darkTechGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Center T -->
    <rect x="30" y="50" width="40" height="6" rx="3" fill="url(#darkTechGrad)"/>
    <rect x="47" y="50" width="6" height="40" rx="3" fill="url(#darkTechGrad)"/>
    
    <!-- Tech nodes -->
    <circle cx="50" cy="70" r="4" fill="#2DD4BF"/>
    <circle cx="30" cy="70" r="2.5" fill="#38BDF8" opacity="0.8"/>
    <circle cx="70" cy="70" r="2.5" fill="#38BDF8" opacity="0.8"/>
    
    <!-- Connections -->
    <line x1="34" y1="70" x2="46" y2="70" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6"/>
    <line x1="54" y1="70" x2="66" y2="70" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Text "Thea" -->
  <text x="115" y="82" font-family="'SF Pro Display', 'Inter', sans-serif" font-size="58" font-weight="700" fill="#F1F5F9" letter-spacing="-1">
    Thea
  </text>
  
  <!-- Tagline English -->
  <text x="117" y="115" font-family="'SF Pro Display', 'Inter', sans-serif" font-size="13" font-weight="500" fill="#94A3B8" letter-spacing="1.5">
    Everything You Need, Between Your Hands
  </text>
  
  <!-- Accent line -->
  <rect x="117" y="125" width="50" height="2" rx="1" fill="url(#darkAccent)"/>
  
  <!-- Arabic tagline -->
  <text x="117" y="150" font-family="'Tajawal', 'SF Arabic', sans-serif" font-size="14" font-weight="500" fill="#64748B" letter-spacing="0.5">
    كل شي تحتاجه بين يديك
  </text>
</svg>
