<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#iconBg)"/>
  
  <!-- Subtle grid -->
  <pattern id="iconGrid" width="10" height="10" patternUnits="userSpaceOnUse">
    <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#334155" stroke-width="0.3"/>
  </pattern>
  <rect x="10" y="10" width="80" height="80" rx="12" fill="url(#iconGrid)" opacity="0.3"/>
  
  <!-- Logo Mark -->
  <g filter="url(#iconGlow)">
    <!-- Left bracket -->
    <path d="M25 30 L18 30 Q13 30 13 35 L13 65 Q13 70 18 70 L25 70" 
          stroke="url(#iconGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Right bracket -->
    <path d="M75 30 L82 30 Q87 30 87 35 L87 65 Q87 70 82 70 L75 70" 
          stroke="url(#iconGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Center T -->
    <rect x="32" y="35" width="36" height="6" rx="3" fill="url(#iconGrad)"/>
    <rect x="47" y="35" width="6" height="35" rx="3" fill="url(#iconGrad)"/>
    
    <!-- Center node -->
    <circle cx="50" cy="52" r="5" fill="#2DD4BF"/>
    
    <!-- Side nodes -->
    <circle cx="32" cy="52" r="3" fill="#38BDF8" opacity="0.8"/>
    <circle cx="68" cy="52" r="3" fill="#38BDF8" opacity="0.8"/>
    
    <!-- Connections -->
    <line x1="37" y1="52" x2="45" y2="52" stroke="#2DD4BF" stroke-width="2" opacity="0.6"/>
    <line x1="55" y1="52" x2="63" y2="52" stroke="#2DD4BF" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
