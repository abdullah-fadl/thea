# ==============================================================================
# Thea EHR — Deployment Pipeline
# ==============================================================================
# Triggered on push to main. Builds a Docker image, pushes to GHCR,
# deploys to staging, and promotes to production after approval.
# ==============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # Build & Push Docker Image
  # ------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ID=${{ github.sha }}

  # ------------------------------------------------------------------
  # Deploy to Staging
  # ------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}

      # TODO: Add actual staging deploy command (SSH, k8s, ECS, etc.)
      # Example for Docker on a remote server:
      # - name: Deploy to staging server
      #   run: |
      #     ssh deploy@staging.thea.com.sa \
      #       "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} && \
      #        docker compose up -d --no-deps app"

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for staging to be ready..."
          sleep 10
          HEALTH_URL="${{ secrets.STAGING_URL }}/api/health"
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed!"
              BODY=$(curl -s "$HEALTH_URL" 2>/dev/null)
              echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Staging health check FAILED after 30 attempts"
          exit 1

  # ------------------------------------------------------------------
  # Deploy to Production (requires manual approval)
  # ------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      # TODO: Add actual production deploy command
      # - name: Deploy to production
      #   run: |
      #     ssh deploy@app.thea.com.sa \
      #       "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} && \
      #        docker compose up -d --no-deps app"

      - name: Post-deploy health check
        run: |
          echo "Waiting for production to be ready..."
          sleep 15
          HEALTH_URL="${{ secrets.PRODUCTION_URL }}/api/health"
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed!"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Production health check FAILED — initiating rollback!"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "ROLLBACK: Production deploy failed. Manual intervention required."
          echo "Steps to rollback:"
          echo "1. docker pull previous image tag"
          echo "2. docker compose up -d --no-deps app"
          echo "3. Verify /api/health returns 200"
          # TODO: Automate rollback when deploy mechanism is configured
